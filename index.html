<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Oak PVP</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.cdnfonts.com/css/minecraftia" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<img src="https://i.imgur.com/aDepPcr.png" class="top-left-icon" id="icon1" data-tooltip="Sword">
<img src="https://i.imgur.com/Wo3HG50.png" class="top-left-icon" id="icon2" data-tooltip="Axe">
<img src="https://i.imgur.com/sF0OP5M.png" class="top-left-icon" id="icon3" data-tooltip="Mace">
<img src="https://i.imgur.com/rrxfGri.png" class="top-left-icon" id="icon4" data-tooltip="UHC">
<img src="https://i.imgur.com/mfbPQ6G.png" class="top-left-icon" id="icon5" data-tooltip="Pot">
<img src="https://i.imgur.com/zPFwrfs.png" class="top-left-icon" id="icon6" data-tooltip="Netherite OP">
<img src="https://i.imgur.com/7J6TS5u.png" class="top-left-icon" id="icon7" data-tooltip="Smp">
<img src="https://i.imgur.com/94E3KpM.png" class="top-left-icon" id="icon8" data-tooltip="Vanilla">
<img src="https://i.imgur.com/JcV8t0C.png" class="top-left-icon" id="icon9" data-tooltip="Elytra Mace">
<img src="https://i.imgur.com/FPVhcXi.png" class="top-left-icon" id="icon10" data-tooltip="Cart">
<img src="https://i.imgur.com/t0lel83.png" class="top-left-icon" id="icon11" data-tooltip="Overall">
<div class="menu" id="leaderboardMenu">
  <div class="menu-header" id="menuTitle">Overall Leaderboard</div>
  <div class="menu-content" id="menuContent"></div>
</div>

<h1 class="main-title">Oak PVP</h1>

<div class="ip-bubble">
  <span class="ip-label">IP:</span>
  <span class="ip-value" id="ipValue">167.114.213.73:25604</span>
  <button class="copy-btn" id="copyBtn">Copy</button>
  <span class="copied-text" id="copiedText">Copied!</span>
</div>

<div id="terminal" style="display:none; position:fixed; bottom:0; left:0; width:100%; background:black; color:#00ff00; padding:20px; z-index:9999;">
  <div>Admin Code:</div>
   <div class="terminal-line">
    <span class="prompt-symbol">&lt;</span>
  <input id="passwordInput" type="password" style="background:black; border:none; color:#00ff00; outline:none; font-family:'minecraftia'; width:80%;"></div>
</div>

<div id="panel" style="display:none; position:fixed; bottom:0; left:0; width:100%; background:#111; color:#00ff00; padding:20px; z-index:9999;">
  <button id="addBtn" style="margin:10px; font-family:'minecraftia';">Add Stats</button>
  <button id="clearBtn" style="margin:10px; font-family:'minecraftia';">Clear Leaderboard</button>
  <div id="form" style="display:none;">
    <input id="user" placeholder="Username" style="display:block; margin:10px; font-family:'minecraftia'; width:95%;">
    <select id="mode" size="5" style="display:block; margin:10px; font-family:'minecraftia'; width:95.5%;">
      <option>Sword</option>
      <option>Axe</option>
      <option>Mace</option>
      <option>UHC</option>
      <option>Pot</option>
      <option>Netherite OP</option>
      <option>SMP</option>
      <option>Vanilla</option>
      <option>Cart</option>
      <option>Elytra Mace</option>
    </select>
    <input id="points" placeholder="Points" style="display:block; margin:10px; font-family:'minecraftia'; width:95%;">
    <input id="date" placeholder="DD/MM/YYYY HH:MM" style="display:block; margin:10px; font-family:'minecraftia'; width:95%;">
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
