<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Oak PVP</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Top-left icons -->
  <img src="https://i.imgur.com/aDepPcr.png" alt="Icon 1" class="top-left-icon" id="icon1">
  <img src="https://i.imgur.com/Wo3HG50.png" alt="Icon 2" class="top-left-icon" id="icon2">
  <img src="https://i.imgur.com/sF0OP5M.png" alt="Icon 3" class="top-left-icon" id="icon3">
  <img src="https://i.imgur.com/rrxfGri.png" alt="Icon 4" class="top-left-icon" id="icon4">
  <img src="https://i.imgur.com/mfbPQ6G.png" alt="Icon 5" class="top-left-icon" id="icon5">
  <img src="https://i.imgur.com/zPFwrfs.png" alt="Icon 6" class="top-left-icon" id="icon6">
  <img src="https://i.imgur.com/7J6TS5u.png" alt="Icon 7" class="top-left-icon" id="icon7">
  <img src="https://i.imgur.com/94E3KpM.png" alt="Icon 8" class="top-left-icon" id="icon8">
  <img src="https://i.imgur.com/t0lel83.png" alt="Icon 9" class="top-left-icon" id="icon9">

  <!-- Title -->
  <h1 class="main-title">Oak PVP</h1>

  <!-- IP Bubble -->
  <div class="ip-bubble">
    <span class="ip-label">IP:</span>
    <span class="ip-value" id="ipValue">167.</span>
    <button class="copy-btn" id="copyBtn">Copy</button>
    <span class="copied-text" id="copiedText">Copied!</span>
  </div>

  <!-- Scrollable menu -->
  <div id="menu" class="scrollable-menu">
    <!-- Player entries will appear here -->
  </div>

  <script src="script.js"></script>
</body>
</html>
